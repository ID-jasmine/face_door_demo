app:
  name: face_door_demo
  debug: true

camera:
  type: local_usb
  device_index: 0
  width: 640
  height: 480
  fps: 30

model:
  yunet: "models/face_detection_yunet_2023mar.onnx"
  sface: "models/face_recognition_sface_2021dec.onnx"

face_detector:
  score_threshold: 0.8

face_database:
  embedding_path: "data/embeddings/me.npy"
  name: "me"
  threshold: 0.50

access:
  open_duration: 0.5
  cooldown: 3.0

log:
  access_log_path: "data/logs/access.log"
  unknown_cooldown: 3.0

http_server:
  host: "0.0.0.0"
  port: 8000

state:
  file: "runtime/state.json"

recognition:
  interval: 0.5